<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Counter App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #root {
            width: 100%;
            max-width: 500px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .counter-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

        .counter-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .counter-value {
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 10px;
            animation: pulse 0.3s ease-out;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .counter-status {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 10px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-increment {
            background: #48bb78;
            color: white;
        }

        .btn-increment:hover {
            background: #38a169;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(72, 187, 120, 0.3);
        }

        .btn-increment:active {
            transform: translateY(-1px);
        }

        .btn-decrement {
            background: #f56565;
            color: white;
        }

        .btn-decrement:hover {
            background: #e53e3e;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245, 101, 101, 0.3);
        }

        .btn-decrement:active {
            transform: translateY(-1px);
        }

        .btn-reset {
            grid-column: 1 / -1;
            background: #e0e0e0;
            color: #333;
        }

        .btn-reset:hover {
            background: #d0d0d0;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            background: #f7f7f7;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #667eea;
            font-weight: 700;
            font-size: 16px;
        }

        .log-section {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .log-header {
            color: #4ec9b0;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .log-entry {
            color: #9cdcfe;
            margin: 5px 0;
            padding-left: 10px;
            border-left: 2px solid #667eea;
        }

        .log-entry .time {
            color: #ce9178;
        }

        .log-entry .action {
            color: #c586c0;
        }

        .log-entry .value {
            color: #4ec9b0;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
            color: #667eea;
            line-height: 1.6;
        }

        .info-box strong {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .counter-value {
                font-size: 48px;
            }

            .btn {
                padding: 14px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function Counter() {
            const [count, setCount] = useState(0);
            const [logs, setLogs] = useState([]);
            const [totalIncrements, setTotalIncrements] = useState(0);
            const [totalDecrements, setTotalDecrements] = useState(0);
            const [maxValue, setMaxValue] = useState(0);
            const [minValue, setMinValue] = useState(0);
            const logIndexRef = useRef(0);

            // useEffect to log count changes
            useEffect(() => {
                const timestamp = new Date().toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    second: '2-digit'
                });

                let action = 'Initialize';
                if (count > 0) {
                    action = 'Increment';
                    setTotalIncrements(prev => prev + 1);
                } else if (count < 0) {
                    action = 'Decrement';
                    setTotalDecrements(prev => prev + 1);
                } else if (logIndexRef.current > 0) {
                    action = 'Reset';
                }

                if (count > maxValue) {
                    setMaxValue(count);
                }
                if (count < minValue) {
                    setMinValue(count);
                }

                const logEntry = `[${timestamp}] ${action} → Count: ${count}`;
                
                setLogs(prevLogs => {
                    const newLogs = [logEntry, ...prevLogs.slice(0, 9)];
                    console.log(`%c${action}:`, 'color: #667eea; font-weight: bold;', `Count changed to ${count}`);
                    return newLogs;
                });

                logIndexRef.current++;
            }, [count, maxValue, minValue]);

            const increment = () => {
                setCount(prevCount => prevCount + 1);
            };

            const decrement = () => {
                setCount(prevCount => prevCount - 1);
            };

            const reset = () => {
                setCount(0);
                setTotalIncrements(0);
                setTotalDecrements(0);
                setMaxValue(0);
                setMinValue(0);
                setLogs([]);
                logIndexRef.current = 0;
            };

            const getStatus = () => {
                if (count > 10) return '🔥 Very High!';
                if (count > 5) return '⬆️ High';
                if (count > 0) return '📈 Positive';
                if (count === 0) return '⚖️ Neutral';
                if (count > -5) return '📉 Negative';
                if (count > -10) return '⬇️ Very Low';
                return '❄️ Critical';
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>⚛️ React Counter</h1>
                        <p>Built with useState & useEffect Hooks</p>
                    </div>

                    <div className="counter-display">
                        <div className="counter-label">Current Count</div>
                        <div className="counter-value">{count}</div>
                        <div className="counter-status">{getStatus()}</div>
                    </div>

                    <div className="button-group">
                        <button className="btn btn-decrement" onClick={decrement}>
                            ➖ Decrement
                        </button>
                        <button className="btn btn-increment" onClick={increment}>
                            ➕ Increment
                        </button>
                        <button className="btn btn-reset" onClick={reset}>
                            🔄 Reset All
                        </button>
                    </div>

                    <div className="stats">
                        <div className="stat-row">
                            <span className="stat-label">Total Increments:</span>
                            <span className="stat-value">+{totalIncrements}</span>
                        </div>
                        <div className="stat-row">
                            <span className="stat-label">Total Decrements:</span>
                            <span className="stat-value">-{totalDecrements}</span>
                        </div>
                        <div className="stat-row">
                            <span className="stat-label">Highest Value:</span>
                            <span className="stat-value">{maxValue}</span>
                        </div>
                        <div className="stat-row">
                            <span className="stat-label">Lowest Value:</span>
                            <span className="stat-value">{minValue}</span>
                        </div>
                        <div className="stat-row">
                            <span className="stat-label">Total Changes:</span>
                            <span className="stat-value">{totalIncrements + totalDecrements}</span>
                        </div>
                    </div>

                    <div className="log-section">
                        <div className="log-header">📋 Activity Log (useEffect):</div>
                        {logs.length === 0 ? (
                            <div className="log-entry" style={{ color: '#999' }}>No activity yet...</div>
                        ) : (
                            logs.map((log, index) => (
                                <div key={index} className="log-entry">
                                    {log}
                                </div>
                            ))
                        )}
                    </div>

                    <div className="info-box">
                        <strong>🎯 How it works:</strong>
                        useState manages the counter value and statistics. 
                        useEffect tracks every count change and logs it. 
                        Open browser console (F12) to see detailed logs.
                    </div>
                </div>
            );
        }

        // Render the Counter component
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Counter />);
    </script>
</body>
</html>
